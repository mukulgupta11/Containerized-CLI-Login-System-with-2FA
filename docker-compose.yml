version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cli-login-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: cli_login_db
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cli_login_db"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  cli:
    build: .
    container_name: cli-login-app
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres_secure_pass
      - DB_NAME=cli_login_db
      - DB_SSLMODE=disable
      - SESSION_TIMEOUT_MINUTES=15
      - LOCKOUT_ATTEMPTS=5
      - LOCKOUT_DURATION_MINUTES=15
    restart: "no"

volumes:
  db-data:
    driver: local
